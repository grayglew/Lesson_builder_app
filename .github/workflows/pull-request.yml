name: Pull request validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, type-check, unit test, and build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-build-placeholder
      STUDENT_SESSION_CODE_SECRET: ci-build-placeholder
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run unit and contract tests
        run: npm run test:unit

      - name: Build application
        run: npm run build

  staging-preview:
    name: Deploy and verify staging preview
    needs: validate
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      PRODUCTION_SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_REF }}
    steps:
      - name: Check staging deployment configuration
        id: staging_config
        shell: bash
        run: |
          if [[ -z "$VERCEL_ORG_ID" || -z "$VERCEL_PROJECT_ID" || -z "$VERCEL_TOKEN" || -z "$PRODUCTION_SUPABASE_PROJECT_REF" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "### Staging preview skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Configure the staging environment secrets documented in docs/operations/production-release.md to enable preview deployment." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out source
        if: steps.staging_config.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.staging_config.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.staging_config.outputs.enabled == 'true'
        run: npm ci

      - name: Install pinned Vercel CLI
        if: steps.staging_config.outputs.enabled == 'true'
        run: npm install --global vercel@56.3.1

      - name: Pull staging configuration
        if: steps.staging_config.outputs.enabled == 'true'
        run: vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"

      - name: Assert staging is isolated from production
        if: steps.staging_config.outputs.enabled == 'true'
        shell: bash
        run: |
          set -a
          source .vercel/.env.preview.local
          set +a
          node scripts/assert-preview-environment.mjs

      - name: Build preview artifact
        if: steps.staging_config.outputs.enabled == 'true'
        run: vercel build --token "$VERCEL_TOKEN"

      - name: Deploy preview artifact
        if: steps.staging_config.outputs.enabled == 'true'
        id: deploy
        shell: bash
        run: |
          deployment_url="$(vercel deploy --prebuilt --token "$VERCEL_TOKEN" | tail -n 1)"
          if [[ ! "$deployment_url" =~ ^https://[a-zA-Z0-9.-]+\.vercel\.app$ ]]; then
            echo "::error::Vercel did not return a valid preview URL."
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "### Staging preview" >> "$GITHUB_STEP_SUMMARY"
          echo "$deployment_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Install Playwright browser
        if: steps.staging_config.outputs.enabled == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        if: steps.staging_config.outputs.enabled == 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs.deployment_url }}
        shell: bash
        run: |
          set -a
          source .vercel/.env.preview.local
          set +a
          npm run test:e2e

      - name: Upload Playwright report on failure
        if: steps.staging_config.outputs.enabled == 'true' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment with preview URL
        if: steps.staging_config.outputs.enabled == 'true' && success()
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        with:
          script: |
            const marker = "<!-- lesson-builder-staging-preview -->";
            const body = `${marker}\nStaging preview verified: ${process.env.DEPLOYMENT_URL}`;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) =>
                comment.user?.type === "Bot" &&
                typeof comment.body === "string" &&
                comment.body.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
