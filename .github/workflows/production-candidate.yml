name: Create production candidate

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Exact 40-character commit SHA to build
        required: true
        type: string
      confirmation:
        description: Type STAGE to create an unaliased production candidate
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-candidate
  cancel-in-progress: false

jobs:
  candidate:
    name: Build and stage candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production-candidate
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Validate manual inputs
        shell: bash
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [[ "$CONFIRMATION" != "STAGE" ]]; then
            echo "::error::Confirmation must be exactly STAGE."
            exit 1
          fi
          if [[ ! "$COMMIT_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::commit_sha must be an exact 40-character Git commit SHA."
            exit 1
          fi

      - name: Check out selected commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Confirm checked-out commit
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.commit_sha }}
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [[ "${actual_sha,,}" != "${REQUESTED_SHA,,}" ]]; then
            echo "::error::Checked-out commit does not match the requested SHA."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: |
          npm run lint
          npm run typecheck
          npm run test:unit

      - name: Install pinned Vercel CLI
        run: npm install --global vercel@56.3.1

      - name: Pull production configuration
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build production artifact
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy without assigning production domains
        id: deploy
        shell: bash
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --skip-domain --token "$VERCEL_TOKEN" | tail -n 1)"
          if [[ ! "$deployment_url" =~ ^https://[a-zA-Z0-9.-]+\.vercel\.app$ ]]; then
            echo "::error::Vercel did not return a valid candidate URL."
            exit 1
          fi
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "### Production candidate (not promoted)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ inputs.commit_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $deployment_url" >> "$GITHUB_STEP_SUMMARY"
          echo "- The production domain was not changed." >> "$GITHUB_STEP_SUMMARY"

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke-test candidate
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs.deployment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production-candidate
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30
